<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSM Smart Engine v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ultra smooth micro-animations */
        .fade-in { animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .models-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .models-list.open {
            max-height: 600px;
        }
        
        /* Custom layout scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans antialiased selection:bg-cyan-500/30">

    <header class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-md border-b border-slate-900 px-4 py-4">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <button onclick="resetToHome()" class="text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 transition-opacity hover:opacity-90">
                GSM Smart Engine
            </button>
            <div id="global-counter" class="text-[11px] font-mono bg-slate-900 border border-slate-800 px-2.5 py-1 rounded-md text-slate-400">
                Total Items: <span id="total-count" class="text-cyan-400 font-bold">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 pb-24">
        
        <div class="relative mb-6 group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <svg class="w-5 h-5 text-slate-500 group-focus-within:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input 
                type="text" 
                id="search-input"
                placeholder="Type model name to search (e.g. Y17, iQOO, Y21)..." 
                class="w-full bg-slate-900 border-2 border-slate-800 rounded-2xl pl-12 pr-4 py-3.5 text-base text-slate-100 placeholder-slate-500 focus:outline-none focus:border-cyan-500/80 focus:ring-4 focus:ring-cyan-500/5 transition-all shadow-xl"
            >
        </div>

        <div id="app-content" class="fade-in">
            </div>

    </main>

    <button onclick="openAddModal()" class="fixed bottom-6 right-6 h-14 w-14 bg-gradient-to-tr from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-slate-950 rounded-full shadow-[0_0_25px_rgba(6,182,212,0.3)] flex items-center justify-center transition-transform hover:scale-110 active:scale-95 z-40">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
    </button>

    <div id="crudModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md shadow-2xl transform scale-95 transition-transform duration-300" id="modal-box">
            <div class="flex justify-between items-center p-4 border-b border-slate-800">
                <h3 id="modal-title" class="text-base font-bold text-slate-200">Add New Component</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white bg-slate-800 rounded-full p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <form id="crud-form" class="p-4 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 mb-1">Category</label>
                        <select id="f-category" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-cyan-500"><option>Display</option><option>Screen Protector</option><option>Sub Charging Board</option><option>Battery</option></select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 mb-1">Brand</label>
                        <select id="f-brand" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-cyan-500"><option>Vivo</option><option>Realme</option><option>Oppo</option><option>Samsung</option></select>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1">Universal Base Name</label>
                    <input type="text" id="f-name" placeholder="e.g. Universal Display Y11" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-cyan-500" required>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1">Supported Models Matrix (Comma separated)</label>
                    <textarea id="f-models" rows="3" placeholder="Y11, Y12, Y15, Y17" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 font-mono focus:outline-none focus:border-cyan-500" required></textarea>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1">Current Stock Count</label>
                    <input type="number" id="f-stock" placeholder="0" min="0" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-cyan-500" required>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-slate-950 font-bold py-2.5 rounded-xl transition-all mt-2 text-sm shadow-lg">
                    Save to System
                </button>
            </form>
        </div>
    </div>

    <script>
        // System Massive Baseline Preloads Array
        const initialDB = [
            {
                id: "item_y11_default",
                category: "Display",
                brand: "Vivo",
                name: "Universal Display Y11",
                stock: 12,
                models: ["Y11", "Y12", "Y15", "Y17", "Y12s"]
            },
            {
                id: "item_y20_v4_massive",
                category: "Display",
                brand: "Vivo",
                name: "Vivo Y20 ALL Universal (V4.0 Version)",
                stock: 45,
                models: [
                    "Vivo Y20", "Vivo Y20A 2021", "Vivo Y20e", "Vivo Y20G", "Vivo Y20i", "Vivo Y20T", "Vivo Y20s", "Vivo Y20SG", "Y20 2021",
                    "Vivo Y10", "Vivo Y11s", "Vivo Y12A", "Vivo Y12D", "Vivo Y12 New", "Vivo Y26B", "Vivo Y12G", "Vivo Y12s 2021",
                    "Vivo Y21", "Vivo Y21A", "Vivo Y21e", "Vivo Y21C", "Vivo Y21G", "Vivo Y21s (V2110)", "Vivo Y21T", "Vivo Y22T", "Vivo Y22", "Vivo Y22A", "Vivo Y22e", "Vivo Y22 New", "Vivo Y22s", "Vivo Y22t", "Vivo Y24A",
                    "Vivo Y15A", "Vivo Y15s", "Vivo Y15C", "Vivo Y01", "Vivo Y01A", "Vivo Y02s", "Vivo Y16", "Vivo Y3s", "Vivo Y17s", "Vivo Y28 5G",
                    "Vivo Y30G", "Vivo Y30 2021", "Vivo Y30 5G", "Vivo Y31 New", "Vivo Y31 2020", "Vivo Y31s 5G", "Vivo Y31W", "Vivo Y33t", "Vivo Y32", "Vivo Y33e", "Vivo Y33s", "Vivo Y33 5G", "Vivo Y35", "Vivo Y35 New",
                    "Vivo U5e", "Vivo G2", "Vivo Y51 2020", "Vivo Y51 New", "Vivo Y51A", "Vivo Y51s", "Vivo Y52 5G", "Vivo Y55s", "Vivo Y55 5G", "Vivo Y56 New", "Vivo Y56 5G", "Vivo Y74s", "Vivo Y75 5G", "Vivo Y76s", "Vivo Y76 5G", "Vivo Y77 5G",
                    "Vivo T2X 5G", "Vivo Y53s (V2058)", "Vivo Y72t", "Vivo T1 5G", "Vivo T1X",
                    "Vivo iQOO U3", "Vivo iQOO U1X", "Vivo iQOO U3X", "Vivo iQOO Z3", "iQOO Z6 5G", "iQOO Z6 Lite 5G Version"
                ]
            }
        ];

        let inventory = JSON.parse(localStorage.getItem('gsm_v5_core')) || initialDB;
        
        // Execution Runtime States Tracker
        let currentView = 'categories'; 
        let selectedCategory = '';
        let selectedBrand = '';
        let currentEditingId = null; 
        
        const appContent = document.getElementById('app-content');
        const searchInput = document.getElementById('search-input');
        const totalCountEl = document.getElementById('total-count');

        const categoryIcons = {
            'Display': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>`,
            'Screen Protector': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>`,
            'Sub Charging Board': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13 10V3L4 14h7v7l9-11h-7z"></path>`,
            'Battery': `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 8h16M4 16h16"></path>`
        };

        function render() {
            appContent.innerHTML = '';
            totalCountEl.textContent = inventory.length;
            
            const query = searchInput.value.toLowerCase().trim();
            if (query.length > 0) {
                renderSearchResults(query);
                return;
            }

            if (currentView === 'categories') renderCategories();
            else if (currentView === 'brands') renderBrands();
            else if (currentView === 'items') renderItemsList();
        }

        function renderCategories() {
            const list = ['Display', 'Screen Protector', 'Sub Charging Board', 'Battery'];
            let html = `<h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 ml-1">Categories</h2><div class="grid grid-cols-2 gap-3">`;
            
            list.forEach(cat => {
                html += `
                    <button onclick="selectCategory('${cat}')" class="bg-slate-900/60 border border-slate-800/80 hover:border-cyan-500/40 rounded-2xl p-5 flex flex-col items-center justify-center gap-3 transition-all active:scale-95 group shadow-lg">
                        <div class="p-3 bg-slate-800/50 rounded-xl text-cyan-400 group-hover:bg-cyan-500/10 transition-colors">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">${categoryIcons[cat] || categoryIcons['Display']}</svg>
                        </div>
                        <span class="font-bold text-slate-300 text-xs md:text-sm tracking-wide">${cat}</span>
                    </button>
                `;
            });
            html += `</div>`;
            appContent.innerHTML = html;
        }

        function renderBrands() {
            const uniqueBrands = [...new Set(inventory.filter(i => i.category === selectedCategory).map(i => i.brand))];
            
            let html = `
                <div class="flex items-center gap-3 mb-5">
                    <button onclick="navigateBack('categories')" class="p-2 bg-slate-900 border border-slate-800 rounded-full text-slate-400 hover:text-white transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                    <div>
                        <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${selectedCategory}</h2>
                        <p class="text-base font-bold text-slate-200">Select Brand</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            `;
            
            if (uniqueBrands.length === 0) {
                html += `<div class="col-span-full text-center text-xs text-slate-500 py-10 bg-slate-900 rounded-2xl border border-dashed border-slate-800">No components mapped inside this category path yet.</div>`;
            } else {
                uniqueBrands.forEach(brand => {
                    html += `
                        <button onclick="selectBrand('${brand}')" class="bg-slate-900/60 border border-slate-800/80 hover:border-blue-500/40 rounded-2xl p-4 font-bold text-slate-300 text-sm transition-all active:scale-95 shadow-lg">
                            ${brand}
                        </button>
                    `;
                });
            }
            html += `</div>`;
            appContent.innerHTML = html;
        }

        function renderItemsList() {
            const filtered = inventory.filter(i => i.category === selectedCategory && i.brand === selectedBrand);
            
            let html = `
                <div class="flex items-center gap-3 mb-5">
                    <button onclick="navigateBack('brands')" class="p-2 bg-slate-900 border border-slate-800 rounded-full text-slate-400 hover:text-white transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                    <div>
                        <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${selectedCategory} / ${selectedBrand}</h2>
                        <p class="text-base font-bold text-slate-200">Universal Links</p>
                    </div>
                </div>
            `;
            html += compileCardEngineHTML(filtered);
            appContent.innerHTML = html;
        }

        function renderSearchResults(query) {
            let filtered = inventory.filter(item => {
                return item.name.toLowerCase().includes(query) || 
                       item.models.some(m => m.toLowerCase().includes(query));
            });

            filtered.sort((a, b) => {
                const aMatch = a.models.some(m => m.toLowerCase() === query);
                const bMatch = b.models.some(m => m.toLowerCase() === query);
                if (aMatch && !bMatch) return -1;
                if (!aMatch && bMatch) return 1;
                return 0;
            });

            let html = `
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 ml-1">
                    Matches Found <span class="text-cyan-400 font-mono">(${filtered.length})</span>
                </h2>
            `;
            html += compileCardEngineHTML(filtered);
            appContent.innerHTML = html;
        }

        // GENERATE CLEAN COMPONENT CARD HTML WITH INTEGRATED CRUD CONTROLS
        function compileCardEngineHTML(items) {
            if (items.length === 0) return `<div class="text-center text-xs text-slate-500 py-10 bg-slate-900 rounded-2xl border border-dashed border-slate-800">No active matrix items located.</div>`;
            
            let html = `<div class="space-y-4.5">`;
            items.forEach(item => {
                const isLow = item.stock < 5;
                const statusTheme = isLow ? 'border-amber-500/20 bg-amber-500/5 text-amber-400' : 'border-emerald-500/20 bg-emerald-500/5 text-emerald-400';
                const tagBadges = item.models.map(m => `<span class="bg-slate-950 text-slate-300 px-2 py-0.5 rounded border border-slate-850 text-[11px] font-mono">${m}</span>`).join('');

                html += `
                    <div class="bg-slate-900/40 border border-slate-850 rounded-2xl p-4 shadow-xl relative group/card transition-all duration-300 hover:border-slate-800">
                        
                        <div class="absolute top-4 right-4 flex items-center gap-1.5 opacity-80 md:opacity-0 group-hover/card:opacity-100 transition-opacity z-10">
                            <button onclick="triggerEditItem('${item.id}')" title="Edit Item" class="p-1.5 bg-slate-800/80 hover:bg-slate-700 rounded-md text-slate-300 hover:text-cyan-400 transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button onclick="triggerDeleteItem('${item.id}')" title="Delete Item" class="p-1.5 bg-slate-800/80 hover:bg-red-950/40 rounded-md text-slate-400 hover:text-red-400 transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>

                        <div class="flex justify-between items-start gap-4 pr-16">
                            <div>
                                <h3 class="text-sm md:text-base font-bold text-slate-100 leading-snug">${item.name}</h3>
                                <div class="flex gap-1.5 mt-1.5">
                                    <span class="text-[9px] uppercase font-bold tracking-widest bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">${item.brand}</span>
                                    <span class="text-[9px] uppercase font-bold tracking-widest bg-cyan-950/40 text-cyan-400 px-1.5 py-0.5 rounded border border-cyan-900/30">${item.category}</span>
                                </div>
                            </div>
                            <div class="text-center min-w-[55px] border ${statusTheme} rounded-xl px-2 py-1">
                                <span class="block text-base font-black leading-none font-mono">${item.stock}</span>
                                <span class="block text-[8px] uppercase tracking-wider font-bold mt-0.5 opacity-80">Stock</span>
                            </div>
                        </div>

                        <button onclick="toggleCardModels('${item.id}')" class="mt-4 w-full flex items-center justify-between p-2.5 bg-slate-950/40 hover:bg-slate-950 border border-slate-850 rounded-xl transition-all group/btn">
                            <span class="text-xs font-medium text-slate-400 group-hover/btn:text-slate-200" id="tx-lbl-${item.id}">View Supported Models (${item.models.length})</span>
                            <svg id="arr-${item.id}" class="w-4 h-4 text-slate-500 group-hover/btn:text-cyan-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>

                        <div id="mod-container-${item.id}" class="models-list">
